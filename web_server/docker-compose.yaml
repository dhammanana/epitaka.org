version: '3.9'

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: epitaka-web
    ports:
      - "8080:8080"           # Access at http://localhost:8080/  (root path)
    environment:
      - FLASK_ENV=production
      # Remove or keep commented: no evidence your current code needs BASE_URL=/tpk
      # - BASE_URL=/tpk
    # You can keep this volume if you want to easily replace/swap the db later
    # without rebuilding the image every time the database changes
    # volumes:
      # - ./translations.db:/app/translations.db:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/"]   # ← root path (most likely correct now)
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s       # Give Gunicorn + app a bit more time to start

  web-dev:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: epitaka-dev
    ports:
      - "8081:8080"
    environment:
      - FLASK_ENV=development
      # - FLASK_DEBUG=1       # optional – your run.py already has debug=True
    volumes:
      - ./web_server:/app     # full source code mount for live editing
    command: ["python", "run.py"]
    profiles: ["dev"]